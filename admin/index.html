<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arvixy Admin</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#0F172A', 50: '#F1F5F9', 100: '#E2E8F0' },
            accent: { DEFAULT: '#2563EB', 50: '#EFF6FF' },
            cyan: { DEFAULT: '#06B6D4', 50: '#ECFEFF' },
            violet: { DEFAULT: '#7C3AED', 50: '#F5F3FF' },
            surface: { DEFAULT: '#F8FAFC', muted: '#F1F5F9' },
          },
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    .btn-gradient { background: linear-gradient(135deg, #0F172A 0%, #2563EB 58%, #06B6D4 100%); }
    .btn-gradient:hover { filter: brightness(1.06); }
    .toast { animation: slideUp 0.3s ease-out both; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.7s linear infinite; }
    .section-card { transition: box-shadow 0.2s; }
    .section-card:focus-within { box-shadow: 0 0 0 2px #2563EB40; }
  </style>
</head>
<body class="min-h-screen bg-surface">

  <!-- Header -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center">
          <span class="text-white font-display font-bold text-sm">A</span>
        </div>
        <span class="font-display font-bold text-lg text-primary">Arvixy Admin</span>
      </div>
      <div class="flex items-center gap-4">
        <a href="/admin/submissions" class="text-sm font-medium text-gray-500 hover:text-primary transition-colors flex items-center gap-1.5">
          <span class="material-symbols-outlined text-lg">mail</span>
          Consultas
        </a>
        <button id="logoutBtn" class="text-sm font-medium text-gray-400 hover:text-red-500 transition-colors flex items-center gap-1.5">
          <span class="material-symbols-outlined text-lg">logout</span>
          Salir
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-4xl mx-auto px-6 py-10 space-y-10">

    <!-- ── 1. Logo ── -->
    <section class="section-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="px-7 py-5 border-b border-gray-100 flex items-center gap-3">
        <span class="material-symbols-outlined text-accent">image</span>
        <h2 class="font-display font-semibold text-lg text-primary">Logo</h2>
      </div>
      <div class="p-7 flex flex-col sm:flex-row items-start sm:items-center gap-6">
        <div class="shrink-0">
          <img id="logoPreview" src="" alt="Logo" class="h-12 w-auto rounded-lg border border-gray-200 object-contain bg-white" />
        </div>
        <div class="flex-1">
          <p class="text-sm text-gray-400 mb-3">Subí una imagen PNG o SVG. Se recomienda fondo transparente.</p>
          <label class="inline-flex items-center gap-2 btn-gradient text-white px-5 py-2.5 rounded-xl font-semibold text-sm cursor-pointer transition-all hover:-translate-y-0.5">
            <span class="material-symbols-outlined text-lg">upload</span>
            Cambiar logo
            <input type="file" id="logoInput" accept="image/*" class="hidden" />
          </label>
          <p id="logoFileName" class="text-xs text-gray-400 mt-2"></p>
        </div>
      </div>
      <div class="px-7 py-4 bg-gray-50 border-t border-gray-100 flex justify-end">
        <button data-section="logo" class="save-btn inline-flex items-center gap-2 bg-primary hover:bg-primary/90 text-white px-6 py-2.5 rounded-xl font-semibold text-sm transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
          <span class="material-symbols-outlined text-lg">save</span>
          Guardar logo
        </button>
      </div>
    </section>

    <!-- ── 2. Hero ── -->
    <section class="section-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="px-7 py-5 border-b border-gray-100 flex items-center gap-3">
        <span class="material-symbols-outlined text-accent">home</span>
        <h2 class="font-display font-semibold text-lg text-primary">Hero</h2>
      </div>
      <div class="p-7 space-y-5">
        <div>
          <label class="block text-sm font-semibold text-primary mb-1.5">Título</label>
          <input id="heroTitle" type="text" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-surface focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all text-primary outline-none text-base" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-primary mb-1.5">Subtítulo</label>
          <textarea id="heroSubtitle" rows="2" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-surface focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all text-primary outline-none text-base resize-none"></textarea>
        </div>
        <div>
          <label class="block text-sm font-semibold text-primary mb-1.5">URL de imagen hero</label>
          <input id="heroImageUrl" type="url" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-surface focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all text-primary outline-none text-base" placeholder="https://…" />
        </div>
        <div class="flex items-center gap-4">
          <label class="inline-flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-xl font-semibold text-sm cursor-pointer transition-all">
            <span class="material-symbols-outlined text-lg">upload</span>
            Subir imagen
            <input type="file" id="heroImageInput" accept="image/*" class="hidden" />
          </label>
          <img id="heroImagePreview" src="" alt="" class="h-16 rounded-lg border border-gray-200 hidden" />
        </div>
      </div>
      <div class="px-7 py-4 bg-gray-50 border-t border-gray-100 flex justify-end">
        <button data-section="hero" class="save-btn inline-flex items-center gap-2 bg-primary hover:bg-primary/90 text-white px-6 py-2.5 rounded-xl font-semibold text-sm transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
          <span class="material-symbols-outlined text-lg">save</span>
          Guardar hero
        </button>
      </div>
    </section>

    <!-- ── 3. Soluciones ── -->
    <section class="section-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="px-7 py-5 border-b border-gray-100 flex items-center gap-3">
        <span class="material-symbols-outlined text-accent">grid_view</span>
        <h2 class="font-display font-semibold text-lg text-primary">Soluciones</h2>
      </div>
      <div id="solutionsList" class="p-7 space-y-6">
        <!-- Se llena con JS -->
      </div>
      <div class="px-7 py-4 bg-gray-50 border-t border-gray-100 flex justify-end">
        <button data-section="solutions" class="save-btn inline-flex items-center gap-2 bg-primary hover:bg-primary/90 text-white px-6 py-2.5 rounded-xl font-semibold text-sm transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
          <span class="material-symbols-outlined text-lg">save</span>
          Guardar soluciones
        </button>
      </div>
    </section>

    <!-- ── 4. Footer ── -->
    <section class="section-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="px-7 py-5 border-b border-gray-100 flex items-center gap-3">
        <span class="material-symbols-outlined text-accent">footer</span>
        <h2 class="font-display font-semibold text-lg text-primary">Footer</h2>
      </div>
      <div class="p-7">
        <label class="block text-sm font-semibold text-primary mb-1.5">Texto descriptivo</label>
        <textarea id="footerText" rows="2" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-surface focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all text-primary outline-none text-base resize-none"></textarea>
      </div>
      <div class="px-7 py-4 bg-gray-50 border-t border-gray-100 flex justify-end">
        <button data-section="footer" class="save-btn inline-flex items-center gap-2 bg-primary hover:bg-primary/90 text-white px-6 py-2.5 rounded-xl font-semibold text-sm transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
          <span class="material-symbols-outlined text-lg">save</span>
          Guardar footer
        </button>
      </div>
    </section>

  </main>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 hidden">
    <div class="toast bg-primary text-white px-5 py-3 rounded-xl shadow-xl font-medium text-sm flex items-center gap-2">
      <span class="material-symbols-outlined text-lg text-cyan">check_circle</span>
      <span id="toastMsg">Cambios guardados</span>
    </div>
  </div>

  <script>
    // ── State ──
    let content = {};
    let pendingLogo = null; // { file, url }

    // ── Init ──
    (async () => {
      try {
        const r = await fetch('/api/content', { credentials: 'include' });
        if (!r.ok) { window.location.href = '/admin/login'; return; }
        const json = await r.json();
        content = json.data ?? {};
        render();
      } catch {
        document.body.innerHTML = '<p class="text-center mt-20 text-red-500">Error al cargar contenido.</p>';
      }
    })();

    // ── Render ──
    function render() {
      // Logo
      document.getElementById('logoPreview').src = content.logo_url || '';

      // Hero
      document.getElementById('heroTitle').value = content.hero_title || '';
      document.getElementById('heroSubtitle').value = content.hero_subtitle || '';
      document.getElementById('heroImageUrl').value = content.hero_image_url || '';
      const heroImg = document.getElementById('heroImagePreview');
      if (content.hero_image_url) {
        heroImg.src = content.hero_image_url;
        heroImg.classList.remove('hidden');
      }

      // Footer
      document.getElementById('footerText').value = content.footer_text || '';

      // Solutions
      renderSolutions();
    }

    function renderSolutions() {
      const list = document.getElementById('solutionsList');
      const solutions = content.solutions || [];
      if (solutions.length === 0) {
        list.innerHTML = '<p class="text-gray-400 text-sm">No hay soluciones cargadas.</p>';
        return;
      }
      list.innerHTML = solutions.map((s, i) => `
        <div class="rounded-xl border border-gray-200 p-5 space-y-4 bg-surface">
          <div class="flex items-center justify-between">
            <span class="font-display font-semibold text-primary">Solución ${i + 1}</span>
            <input type="text" data-solution="${i}" data-field="icon"
              value="${esc(s.icon)}"
              placeholder="Icono (nombre de Google Material Symbol)"
              class="w-48 px-3 py-1.5 rounded-lg border border-gray-200 bg-white text-sm outline-none focus:border-accent" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Título</label>
            <input type="text" data-solution="${i}" data-field="title"
              value="${esc(s.title)}"
              class="w-full px-3 py-2 rounded-lg border border-gray-200 bg-white text-sm outline-none focus:border-accent" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Descripción</label>
            <textarea data-solution="${i}" data-field="description" rows="2"
              class="w-full px-3 py-2 rounded-lg border border-gray-200 bg-white text-sm outline-none focus:border-accent resize-none">${esc(s.description)}</textarea>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Features (una por línea)</label>
            <textarea data-solution="${i}" data-field="features"
              rows="3"
              class="w-full px-3 py-2 rounded-lg border border-gray-200 bg-white text-sm outline-none focus:border-accent resize-none font-mono">${(s.features || []).join('\n')}</textarea>
          </div>
        </div>
      `).join('');
    }

    function esc(str) {
      return (str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Uploads ──
    document.getElementById('logoInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      document.getElementById('logoFileName').textContent = file.name;
      const url = await uploadFile(file);
      if (url) {
        pendingLogo = { file, url };
        document.getElementById('logoPreview').src = url;
      }
    });

    document.getElementById('heroImageInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const url = await uploadFile(file);
      if (url) {
        document.getElementById('heroImageUrl').value = url;
        const preview = document.getElementById('heroImagePreview');
        preview.src = url;
        preview.classList.remove('hidden');
      }
    });

    async function uploadFile(file) {
      const fd = new FormData();
      fd.append('file', file);
      const res = await fetch('/api/upload', { method: 'POST', credentials: 'include', body: fd });
      if (!res.ok) { showToast('Error al subir archivo', 'error'); return null; }
      const { url } = await res.json();
      return url;
    }

    // ── Save ──
    document.querySelectorAll('.save-btn').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const section = btn.dataset.section;
        btn.disabled = true;
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<span class="material-symbols-outlined text-lg spinner">progress_activity</span> Guardando…';

        try {
          if (section === 'logo') {
            content.logo_url = pendingLogo?.url ?? content.logo_url;
            pendingLogo = null;
          } else if (section === 'hero') {
            content.hero_title = document.getElementById('heroTitle').value;
            content.hero_subtitle = document.getElementById('heroSubtitle').value;
            content.hero_image_url = document.getElementById('heroImageUrl').value;
          } else if (section === 'solutions') {
            // Read all solution fields
            const solutionEls = document.querySelectorAll('[data-solution]');
            const map = new Map();
            solutionEls.forEach((el) => {
              const idx = parseInt(el.dataset.solution);
              const field = el.dataset.field;
              if (!map.has(idx)) map.set(idx, {});
              if (field === 'features') {
                map.get(idx)[field] = el.value.split('\n').map(f => f.trim()).filter(Boolean);
              } else {
                map.get(idx)[field] = el.value;
              }
            });
            content.solutions = Array.from(map.values());
            renderSolutions();
          } else if (section === 'footer') {
            content.footer_text = document.getElementById('footerText').value;
          }

          const res = await fetch('/api/content', {
            method: 'PUT',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: content }),
          });
          if (!res.ok) throw new Error('PUT failed');
          showToast('Cambios guardados correctamente');
        } catch {
          showToast('Error al guardar', 'error');
        } finally {
          btn.disabled = false;
          btn.innerHTML = originalHTML;
        }
      });
    });

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMsg');
      toastMsg.textContent = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3500);
    }

    // ── Logout ──
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/admin/login';
    });
  </script>
</body>
</html>
