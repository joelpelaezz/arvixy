<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arvixy Admin — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#0F172A', 50: '#F1F5F9' },
            accent: { DEFAULT: '#2563EB' },
            cyan: { DEFAULT: '#06B6D4' },
            violet: { DEFAULT: '#7C3AED' },
            surface: { DEFAULT: '#F8FAFC', muted: '#F1F5F9' },
          },
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    .btn-gradient { background: linear-gradient(135deg, #0F172A 0%, #2563EB 58%, #06B6D4 100%); }
    .btn-gradient:hover { filter: brightness(1.06); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out both; }
  </style>
</head>
<body class="min-h-screen bg-surface flex items-center justify-center px-4">

  <div class="w-full max-w-md animate-fade-in">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-2">
        <div class="w-10 h-10 rounded-lg bg-accent flex items-center justify-center">
          <span class="text-white font-display font-bold text-lg">A</span>
        </div>
        <span class="font-display font-bold text-2xl text-primary tracking-tight">Arvixy</span>
      </div>
      <p class="text-sm text-gray-400">Panel de administración</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
      <h1 class="font-display text-xl font-bold text-primary mb-1">Iniciar sesión</h1>
      <p class="text-sm text-gray-400 mb-6">Ingresá tu password para acceder al panel.</p>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-primary mb-1.5" for="password">Password</label>
          <input
            type="password"
            id="password"
            required
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-surface focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all text-primary outline-none"
          />
        </div>

        <div id="errorMsg" class="hidden text-sm text-red-500 bg-red-50 border border-red-100 rounded-lg px-4 py-2.5">
          Password incorrecta
        </div>

        <button
          type="submit"
          id="submitBtn"
          class="w-full btn-gradient text-white px-6 py-3 rounded-xl font-semibold text-base transition-all shadow-lg hover:-translate-y-0.5 active:scale-[0.98] flex items-center justify-center gap-2"
        >
          <span id="btnText">Ingresar</span>
          <span id="btnSpinner" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-300 mt-6">
      &copy; 2025 Arvixy — Panel privado
    </p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');

    // Check if already logged in
    (async () => {
      try {
        const r = await fetch('/api/content', { credentials: 'include' });
        if (r.ok) window.location.href = '/admin/';
      } catch {}
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');
      btnText.textContent = 'Verificando…';
      btnSpinner.classList.remove('hidden');
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = '/admin';
        } else {
          errorMsg.textContent = data.error ?? 'Password incorrecta';
          errorMsg.classList.remove('hidden');
        }
      } catch {
        errorMsg.textContent = 'Error de conexión';
        errorMsg.classList.remove('hidden');
      } finally {
        btnText.textContent = 'Ingresar';
        btnSpinner.classList.add('hidden');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
