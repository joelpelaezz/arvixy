<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arvixy Admin — Consultas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#0F172A' },
            accent: { DEFAULT: '#2563EB' },
            cyan: { DEFAULT: '#06B6D4' },
            surface: { DEFAULT: '#F8FAFC' },
          },
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    .toast { animation: slideUp 0.3s ease-out both; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen bg-surface">

  <!-- Header -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center">
          <span class="text-white font-display font-bold text-sm">A</span>
        </div>
        <span class="font-display font-bold text-lg text-primary">Arvixy Admin</span>
      </div>
      <div class="flex items-center gap-4">
        <a href="/admin" class="text-sm font-medium text-gray-500 hover:text-primary transition-colors flex items-center gap-1.5">
          <span class="material-symbols-outlined text-lg">dashboard</span>
          Volver al dashboard
        </a>
        <button id="logoutBtn" class="text-sm font-medium text-gray-400 hover:text-red-500 transition-colors flex items-center gap-1.5">
          <span class="material-symbols-outlined text-lg">logout</span>
          Salir
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-5xl mx-auto px-6 py-10">

    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="font-display text-2xl font-bold text-primary">Consultas del formulario</h1>
        <p class="text-sm text-gray-400 mt-1">Mensajes recibidos desde el sitio público.</p>
      </div>
      <span id="totalBadge" class="bg-accent text-white text-sm font-semibold px-3 py-1 rounded-full">0</span>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden text-center py-20">
      <span class="material-symbols-outlined text-6xl text-gray-200">inbox</span>
      <p class="mt-4 text-gray-400 font-medium">No hay consultas todavía.</p>
    </div>

    <!-- Table -->
    <div id="tableWrapper" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100 text-left">
            <th class="px-6 py-4 font-semibold text-gray-500 uppercase tracking-wider text-xs">Estado</th>
            <th class="px-6 py-4 font-semibold text-gray-500 uppercase tracking-wider text-xs">Fecha</th>
            <th class="px-6 py-4 font-semibold text-gray-500 uppercase tracking-wider text-xs">Nombre</th>
            <th class="px-6 py-4 font-semibold text-gray-500 uppercase tracking-wider text-xs">Email</th>
            <th class="px-6 py-4 font-semibold text-gray-500 uppercase tracking-wider text-xs">Empresa</th>
            <th class="px-6 py-4 font-semibold text-gray-500 uppercase tracking-wider text-xs">Tipo</th>
            <th class="px-6 py-4 font-semibold text-gray-500 uppercase tracking-wider text-xs">Mensaje</th>
          </tr>
        </thead>
        <tbody id="submissionsBody"></tbody>
      </table>
    </div>

  </main>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 px-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[80vh] overflow-y-auto">
      <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between sticky top-0 bg-white rounded-t-2xl">
        <h3 class="font-display font-semibold text-lg text-primary">Detalle de consulta</h3>
        <button id="closeModal" class="text-gray-400 hover:text-gray-600 transition-colors">
          <span class="material-symbols-outlined text-2xl">close</span>
        </button>
      </div>
      <div id="modalContent" class="p-6 space-y-4 text-sm"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 hidden">
    <div class="toast bg-primary text-white px-5 py-3 rounded-xl shadow-xl font-medium text-sm flex items-center gap-2">
      <span class="material-symbols-outlined text-lg text-cyan">check_circle</span>
      <span id="toastMsg">Guardado</span>
    </div>
  </div>

  <script>
    let submissions = [];

    (async () => {
      try {
        const r = await fetch('/api/submissions', { credentials: 'include' });
        if (!r.ok) { window.location.href = '/admin/login'; return; }
        const json = await r.json();
        submissions = json.submissions || [];
        render();
      } catch {
        document.body.innerHTML = '<p class="text-center mt-20 text-red-500">Error al cargar consultas.</p>';
      }
    })();

    function render() {
      document.getElementById('totalBadge').textContent = submissions.length;
      const empty = document.getElementById('emptyState');
      const table = document.getElementById('tableWrapper');
      const tbody = document.getElementById('submissionsBody');

      if (submissions.length === 0) {
        empty.classList.remove('hidden');
        table.classList.add('hidden');
        return;
      }
      empty.classList.add('hidden');
      table.classList.remove('hidden');

      tbody.innerHTML = submissions.map((s) => `
        <tr class="border-b border-gray-50 hover:bg-blue-50/20 cursor-pointer transition-colors ${s.read ? '' : 'font-semibold'}" data-id="${s.id}">
          <td class="px-6 py-4">
            ${s.read
              ? '<span class="inline-flex items-center gap-1 text-gray-400 text-xs"><span class="material-symbols-outlined text-base">check_circle</span>Leído</span>'
              : '<span class="inline-flex items-center gap-1 text-accent text-xs font-semibold"><span class="w-2 h-2 rounded-full bg-accent animate-pulse"></span>Nuevo</span>'
            }
          </td>
          <td class="px-6 py-4 text-gray-500">${fmtDate(s.submitted_at)}</td>
          <td class="px-6 py-4 text-primary">${esc(s.name)}</td>
          <td class="px-6 py-4"><a href="mailto:${esc(s.email)}" class="text-accent hover:underline">${esc(s.email)}</a></td>
          <td class="px-6 py-4 text-gray-600">${esc(s.company || '—')}</td>
          <td class="px-6 py-4 text-gray-600">${esc(s.project_type || '—')}</td>
          <td class="px-6 py-4 text-gray-500 max-w-xs truncate">${esc(s.message || '')}</td>
        </tr>
      `).join('');

      // Click row to open modal
      tbody.querySelectorAll('tr').forEach((row) => {
        row.addEventListener('click', () => openModal(parseInt(row.dataset.id)));
      });
    }

    function openModal(id) {
      const s = submissions.find((s) => s.id === id);
      if (!s) return;
      document.getElementById('modalContent').innerHTML = `
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Nombre</label>
            <p class="text-primary font-medium">${esc(s.name)}</p>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Email</label>
            <p><a href="mailto:${esc(s.email)}" class="text-accent hover:underline">${esc(s.email)}</a></p>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Empresa</label>
            <p class="text-primary">${esc(s.company || '—')}</p>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Tipo de proyecto</label>
            <p class="text-primary">${esc(s.project_type || '—')}</p>
          </div>
          <div class="col-span-2">
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Fecha</label>
            <p class="text-gray-500">${fmtDate(s.submitted_at)}</p>
          </div>
          <div class="col-span-2">
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Mensaje</label>
            <p class="text-primary leading-relaxed whitespace-pre-wrap">${esc(s.message || '—')}</p>
          </div>
        </div>
      `;
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
      // Mark as read
      if (!s.read) {
        s.read = true;
        render();
        // TODO: PATCH read status to backend
      }
    }

    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
    });
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal')) {
        document.getElementById('modal').classList.add('hidden');
        document.getElementById('modal').classList.remove('flex');
      }
    });

    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString('es-AR', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    }

    function esc(str) {
      return (str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/admin/login';
    });

    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }
  </script>
</body>
</html>
